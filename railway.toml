[build]
builder = "nixpacks"
buildCommand = "rm -rf dist && ./node_modules/.bin/tsc"
installCommand = "npm ci"
nixpacks = { version = "node20" }
nodeVersion = "20"

[deploy]
startCommand = "node dist/index.js"
healthcheckPath = "/health"
healthcheckTimeout = 10
restartDelay = 5
healthcheckInterval = 15
healthcheckStartPeriod = 30
healthcheckSuccessThreshold = 1
healthcheckFailureThreshold = 3

[build.environment]
NODE_ENV = "production"
NODE_OPTIONS = "--max_old_space_size=1024"
PORT = "3000"
PUBLIC_HOST_URL = "https://admin.need-shit.fun"



[deploy.regions]
primary = "europe-west1"
fallback = "us-east1"

[deploy.environment]
NODE_ENV = "production"
PORT = "3000"
TRUST_PROXY = "true"
EXPRESS_DISABLE_RATE_LIMIT = "true"
SUPERADMIN_USERNAME = "superadmin"
SUPERADMIN_PASSWORD = "sensitive_data_stored_in_the_cloud"


# Email beállítások
USE_EMAIL = "advanced"  
VERIFY_EMAIL_URL = "https://need-shit.fun/verify"
PASSWORD_RESET_URL = "https://need-shit.fun/password-reset"
CHANGE_EMAIL_URL = "https://need-shit.fun/verify-email-address-change"
# SMTP beállítások a VPS-en futó SMTP szerverhez
EMAIL_SMTP_HOST = "mail.need-shit.fun"
EMAIL_SMTP_PORT = "25"
EMAIL_SMTP_USER = "noreply@need-shit.fun"
EMAIL_SMTP_PASS = "sensitive_data_stored_in_the_cloud"
EMAIL_SMTP_SECURE = "false"
EMAIL_FROM_ADDRESS = "Vendure Store <noreply@need-shit.fun>"

# Asset kezelés beállításai
USE_ASSET_STORAGE = "advanced"
ASSET_URL_PREFIX = "https://minio.need-shit.fun/vendure-assets/"
S3_BUCKET = "vendure-assets"
S3_ACCESS_KEY_ID = "admin"
S3_SECRET_ACCESS_KEY = "sensitive_data_stored_in_the_cloud"
S3_ENDPOINT = "https://minio.need-shit.fun"
S3_REGION = "us-east-1"
S3_FORCE_PATH_STYLE = "true"

# Egyéb beállítások
USE_JOB_QUEUE = "default"
USE_SEARCH = "default"