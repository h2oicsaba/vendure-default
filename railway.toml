[build]
builder = "nixpacks"
buildCommand = "rm -rf dist && npm run build"
installCommand = "npm ci"
nixpacks = { version = "node20" }
nodeVersion = "20"

[deploy]
startCommand = "node dist/index.js"
healthcheckPath = "/health"
healthcheckTimeout = 10
restartDelay = 5
healthcheckInterval = 15
healthcheckStartPeriod = 30
healthcheckSuccessThreshold = 1
healthcheckFailureThreshold = 3

[build.environment]
NODE_ENV = "production"
NODE_OPTIONS = "--max_old_space_size=1024"
PORT = "3000"

[deploy.regions]
primary = "europe-west1"
fallback = "us-east1"

[deploy.environment]
NODE_ENV = "production"
PORT = "3000"
TRUST_PROXY = "true"
EXPRESS_DISABLE_RATE_LIMIT = "true"
# Email beállítások
USE_EMAIL = "default"  # 'default' vagy 'advanced'

# Email URL-ek - ezeket a valódi frontend URL-ekre kell cserélni
VERIFY_EMAIL_URL = "https://your-frontend-domain.com/verify"
PASSWORD_RESET_URL = "https://your-frontend-domain.com/password-reset"
CHANGE_EMAIL_URL = "https://your-frontend-domain.com/verify-email-address-change"

# SMTP beállítások - csak akkor szükségesek, ha USE_EMAIL='advanced'
# EMAIL_SMTP_HOST = "smtp.example.com"
# EMAIL_SMTP_PORT = "587"
# EMAIL_SMTP_USER = "user@example.com"
# EMAIL_SMTP_PASS = "password"
# EMAIL_SMTP_SECURE = "false"
# EMAIL_FROM_ADDRESS = "\"Your Store\" <noreply@example.com>"